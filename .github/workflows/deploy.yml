name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Validate site files
        run: |
          [ -d assets ] || { echo "Error: assets directory not found"; exit 1; }
          [ -f index.html ] || { echo "Error: index.html not found"; exit 1; }
          [ -f script.js ] || { echo "Error: script.js not found"; exit 1; }
          [ -f style.css ] || { echo "Error: style.css not found"; exit 1; }
          [ -f .nojekyll ] || { echo "Error: .nojekyll not found"; exit 1; }

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          cp -R assets _site/assets
          cp index.html script.js style.css .nojekyll _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
